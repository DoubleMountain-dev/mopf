name: folio_reader
description: Folio -- Beautiful book reader with FB2, EPUB, PDF, TXT support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.1.0
  xml: ^6.5.0
  archive: ^3.6.1
  html: ^0.15.4
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
